name: etf-daily

# Mon-Fri 22:30 UTC, per architecture doc §3 (after US markets close).
on:
  schedule:
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}

# See nav-daily.yml: required because this repo's default GITHUB_TOKEN is read-only.
permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run etf_daily
        run: python -m pipeline.jobs.etf_daily

      - name: Commit and push updated artifacts
        run: |
          git config user.name "mfscreener-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No data changes" && exit 0
          git commit -m "chore(data): etf_daily $(date -u +%Y-%m-%d)"
          # See nav-daily.yml comment: retry handles fast-forward races only,
          # not genuine funds.json content conflicts. DECISIONS.md 2026-07-09.
          for i in 1 2 3 4 5; do
            git push && exit 0
            git fetch origin main
            git rebase origin/main
            sleep $((i * 5))
          done
          exit 1
